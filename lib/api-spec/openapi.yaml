openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Student Placement Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student management
  - name: companies
    description: Company management
  - name: jobs
    description: Job drives
  - name: applications
    description: Job applications
  - name: notifications
    description: Notifications
  - name: dashboard
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Bad request

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentListResponse"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student profile (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyListResponse"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all job drives
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job drive (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job drive (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job drive (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications (all for admin, own for student)
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
        - name: studentId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
    post:
      operationId: createApplication
      tags: [applications]
      summary: Apply to a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get an application by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Not found

  /applications/{id}/status:
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      summary: Update application status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
    post:
      operationId: createNotification
      tags: [notifications]
      summary: Send a notification (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/student:
    get:
      operationId: getStudentDashboard
      tags: [dashboard]
      summary: Get student dashboard data
      responses:
        "200":
          description: Student dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDashboard"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    User:
      type: object
      required: [id, email, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    Student:
      type: object
      required: [id, userId, name, email, rollNumber, department, cgpa, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        email:
          type: string
        rollNumber:
          type: string
        department:
          type: string
        cgpa:
          type: number
        phone:
          type: ["string", "null"]
        resumeUrl:
          type: ["string", "null"]
        skills:
          type: string
        status:
          type: string
        tenthPercent:
          type: ["number", "null"]
        twelfthPercent:
          type: ["number", "null"]
        placedCompany:
          type: ["string", "null"]
        placedPackage:
          type: ["number", "null"]
        createdAt:
          type: string

    StudentInput:
      type: object
      required: [name, email, rollNumber, department, cgpa]
      properties:
        name:
          type: string
        email:
          type: string
        rollNumber:
          type: string
        department:
          type: string
        cgpa:
          type: number
        phone:
          type: string
        skills:
          type: string
        tenthPercent:
          type: number
        twelfthPercent:
          type: number

    StudentUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        cgpa:
          type: number
        skills:
          type: string
        resumeUrl:
          type: string
        tenthPercent:
          type: number
        twelfthPercent:
          type: number
        status:
          type: string

    StudentListResponse:
      type: object
      required: [students, total, page, limit]
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/Student"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Company:
      type: object
      required: [id, name, industry, website, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: string
        website:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        createdAt:
          type: string

    CompanyInput:
      type: object
      required: [name, industry]
      properties:
        name:
          type: string
        industry:
          type: string
        website:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        location:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        website:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        location:
          type: string

    CompanyListResponse:
      type: object
      required: [companies, total, page, limit]
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/Company"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Job:
      type: object
      required: [id, title, companyId, companyName, minCgpa, status, driveDate, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        companyId:
          type: integer
        companyName:
          type: string
        description:
          type: ["string", "null"]
        minCgpa:
          type: number
        package:
          type: ["number", "null"]
        location:
          type: ["string", "null"]
        status:
          type: string
        driveDate:
          type: string
        eligibleDepartments:
          type: string
        createdAt:
          type: string

    JobInput:
      type: object
      required: [title, companyId, minCgpa, driveDate]
      properties:
        title:
          type: string
        companyId:
          type: integer
        description:
          type: string
        minCgpa:
          type: number
        package:
          type: number
        location:
          type: string
        status:
          type: string
        driveDate:
          type: string
        eligibleDepartments:
          type: string

    JobUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        minCgpa:
          type: number
        package:
          type: number
        location:
          type: string
        status:
          type: string
        driveDate:
          type: string
        eligibleDepartments:
          type: string

    JobListResponse:
      type: object
      required: [jobs, total, page, limit]
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Application:
      type: object
      required: [id, studentId, jobId, status, createdAt]
      properties:
        id:
          type: integer
        studentId:
          type: integer
        jobId:
          type: integer
        studentName:
          type: ["string", "null"]
        jobTitle:
          type: ["string", "null"]
        companyName:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ApplicationInput:
      type: object
      required: [jobId]
      properties:
        jobId:
          type: integer

    ApplicationStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
        notes:
          type: string

    ApplicationListResponse:
      type: object
      required: [applications, total, page, limit]
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/Application"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Notification:
      type: object
      required: [id, title, message, isRead, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        targetRole:
          type: ["string", "null"]
        createdAt:
          type: string

    NotificationInput:
      type: object
      required: [title, message]
      properties:
        title:
          type: string
        message:
          type: string
        targetRole:
          type: string

    DashboardStats:
      type: object
      required: [totalStudents, totalCompanies, totalJobs, totalApplications, selectedStudents, placementPercentage, monthlyPlacements]
      properties:
        totalStudents:
          type: integer
        totalCompanies:
          type: integer
        totalJobs:
          type: integer
        totalApplications:
          type: integer
        selectedStudents:
          type: integer
        placementPercentage:
          type: number
        avgPackage:
          type: number
        monthlyPlacements:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyPlacement"

    MonthlyPlacement:
      type: object
      required: [month, count]
      properties:
        month:
          type: string
        count:
          type: integer

    StudentDashboard:
      type: object
      required: [student, applications, eligibleJobs, recentNotifications]
      properties:
        student:
          $ref: "#/components/schemas/Student"
        applications:
          type: array
          items:
            $ref: "#/components/schemas/Application"
        eligibleJobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        recentNotifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
